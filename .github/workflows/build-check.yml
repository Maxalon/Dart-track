name: Build check

# Compile gate only — builds a debug APK to verify the code compiles. It does
# NOT create a tag, release, or upload an APK, so it never produces a release.
# Releases are still made exactly once per merge to `main` by release.yml.
#
# Runs on every pull request (e.g. PRs targeting a `sprint-*` integration
# branch) and on direct pushes to `sprint-*` branches, so each change is
# compile-checked before the sprint branch is merged into `main`.

on:
  pull_request:
  push:
    branches: ['sprint-**']

concurrency:
  group: build-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble debug APK (compile gate, no release)
        run: ./gradlew :app:assembleDebug --stacktrace
